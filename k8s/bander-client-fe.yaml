apiVersion: apps/v1
kind: Deployment
metadata:
  name: bander-client-fe
  namespace: bander
  labels:
    app.kubernetes.io/name: bander-client-fe
    app.kubernetes.io/part-of: bander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bander-client-fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bander-client-fe
        app.kubernetes.io/part-of: bander
    spec:
      containers:
        - name: nginx
          image: bander/client-fe:onprem-20260503-115200-booking-detail-layout
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bander-client-fe
  namespace: bander
  labels:
    app.kubernetes.io/name: bander-client-fe
    app.kubernetes.io/part-of: bander
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bander-client-fe
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bander-client-fe
  namespace: bander
  labels:
    app.kubernetes.io/name: bander-client-fe
    app.kubernetes.io/part-of: bander
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - bander.co.kr
        - www.bander.co.kr
      secretName: bander-co-kr-tls
  rules:
    - host: bander.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bander-client-fe
                port:
                  name: http
    - host: www.bander.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bander-client-fe
                port:
                  name: http
